<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | The Anatomy of Regret</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@300;400;600;700;800;900&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- WOLF LABS SUPREME ENGINE V5.5 (ULTIMATE PREMIUM DESIGN) --- */
        :root {
            --bg-dark: #030604; 
            --surface: #0b150e; /* Extremely dark green exactly like reference */
            --surface-inner: #080f0a; /* For nested panels like Speaking Hub */
            --border: #1a3321;
            --accent: #1DB954; /* SPOTIFY GREEN */
            --accent-glow: rgba(29, 185, 84, 0.5);
            --correct: #1DB954;
            --incorrect: #E22134; 
            --text-main: #FFFFFF;
            --text-dim: #9ca8a1;
            --font-display: 'Montserrat', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-body); }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(to top, rgba(3, 6, 4, 1) 10%, rgba(3, 6, 4, 0.8) 100%), url('https://images.unsplash.com/photo-1506126613408-eca07ce68773?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-main); line-height: 1.6; 
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .ambient-orbs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15; animation: floatOrb 20s infinite alternate ease-in-out; }
        .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -5%; left: -5%; }
        .orb-2 { width: 500px; height: 500px; background: #0b662a; bottom: -5%; right: -5%; animation-delay: -5s; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 40px) scale(1.1); } }

        .header { position: fixed; top: 0; left: 0; right: 0; height: 80px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; z-index: 100; background: rgba(3, 6, 4, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); box-shadow: 0 5px 30px rgba(0,0,0,0.7); }
        .logo { font-family: var(--font-display); font-weight: 900; font-size: 1.4rem; letter-spacing: 1px; color: #fff; text-transform: uppercase; display: flex; align-items: center; gap: 12px; }
        .logo span { color: var(--accent); font-family: var(--font-body); font-weight: 800; font-size: 1rem; padding: 4px 8px; border-radius: 6px; background: rgba(29, 185, 84, 0.1); border: 1px solid var(--accent); }
        .progress-container { position: absolute; bottom: -1px; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 20px var(--accent-glow); }
        
        .controls { display: flex; gap: 15px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.3s; }
        .icon-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 5px 20px var(--accent-glow); }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 90px; padding: 0 50px; background: rgba(3, 6, 4, 0.95); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; z-index: 90; backdrop-filter: blur(20px); }

        main { flex: 1; width: 100%; max-width: 1200px; margin: 0 auto; padding-top: 90px; padding-bottom: 100px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        
        .step { position: absolute; width: 100%; opacity: 0; pointer-events: none; transform: scale(0.98) translateY(20px); transition: all 0.5s cubic-bezier(0.25, 1, 0.25, 1); visibility: hidden; display: flex; justify-content: center; }
        .step.active { opacity: 1; pointer-events: auto; transform: scale(1) translateY(0); visibility: visible; }

        .glass-panel { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.9); 
            padding: 45px 55px; 
            position: relative; 
            width: 100%; 
            text-align: left;
            max-height: 75vh; 
            overflow-y: auto; 
            scrollbar-width: thin; 
            scrollbar-color: var(--accent) transparent;
        }
        .glass-panel::-webkit-scrollbar { width: 8px; }
        .glass-panel::-webkit-scrollbar-thumb { background-color: var(--accent); border-radius: 10px; }
        
        .dual-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; }

        /* UPGRADED TYPOGRAPHY */
        h1 { font-family: var(--font-display); font-size: 4rem; line-height: 1.1; margin-bottom: 20px; color: #fff; text-transform: uppercase; }
        h2 { font-family: var(--font-display); font-size: 2.2rem; color: var(--accent); display: flex; align-items: center; gap: 15px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        p { font-size: 1.35rem; color: #d1d5db; margin-bottom: 20px; line-height: 1.7; font-weight: 400; }
        strong { color: #fff; font-weight: 700; }
        .info-text { font-size: 1rem; color: var(--text-dim); display: flex; align-items: center; gap: 10px; margin-top: 25px; font-family: var(--font-code); }

        /* UPGRADED BUTTONS */
        .btn { padding: 18px 45px; border: 1px solid rgba(255,255,255,0.2); border-radius: 500px; font-weight: 900; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); color: #fff; }
        .btn-accent { background: var(--accent); color: #000; border: none; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn:hover { transform: translateY(-3px); background: #fff; color: #000; border-color: #fff; }
        .btn-accent:hover { background: #3be074; color: #000; box-shadow: 0 15px 40px var(--accent-glow); transform: scale(1.02) translateY(-3px); }

        /* UPGRADED SPEAKING HUB */
        .speaking-hub { margin-top: 40px; padding: 35px 30px 25px 30px; background: var(--surface-inner); border-radius: 16px; border: 1px solid #132b19; position: relative; }
        .speaking-hub::before { content: '🎙️ SPEAKING HUB'; position: absolute; top: -18px; left: 25px; background: var(--accent); color: #000; font-family: var(--font-code); font-size: 0.9rem; font-weight: 900; padding: 8px 18px; border-radius: 8px; letter-spacing: 1.5px; box-shadow: 0 0 20px var(--accent-glow); }
        .speaking-hub p { color: #fff; font-weight: 700; font-size: 1.45rem; margin-bottom: 0; line-height: 1.5;}

        /* UPGRADED VOCAB CHIPS */
        .vocab-word { color: var(--accent); font-family: var(--font-code); font-weight: 700; cursor: pointer; border: 2px dashed var(--accent); transition: 0.3s; background: rgba(29, 185, 84, 0.08); padding: 4px 12px; border-radius: 8px; display: inline-block; margin: 0 4px; transform: translateY(-2px); }
        .vocab-word:hover { background: var(--accent); color: #000; box-shadow: 0 5px 15px var(--accent-glow); }

        .choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .choice-card { padding: 25px 20px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.03); border-radius: 16px; transition: all 0.3s; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .choice-card i { font-size: 2.5rem; color: var(--accent); }
        .choice-card p { margin: 0; font-weight: 700; font-size: 1.2rem; color: #fff; }
        .choice-card:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        .toggle-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 20px 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 15px; }
        .toggle-row p { margin: 0; font-size: 1.25rem; color: #fff; font-weight: 500; flex: 1; }
        .toggle-options { display: flex; gap: 10px; }
        .toggle-btn { padding: 10px 25px; border-radius: 500px; font-weight: 800; font-size: 1rem; border: 1px solid var(--border); background: transparent; color: #fff; cursor: pointer; transition: 0.3s; }
        .toggle-btn:hover { background: rgba(255,255,255,0.1); }

        .drop-zone { min-height: 120px; border: 2px dashed rgba(255,255,255,0.3); border-radius: 16px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; padding: 20px; gap: 12px; flex-wrap: wrap; background: rgba(0, 0, 0, 0.3); transition: 0.3s;}
        .drop-zone.success { border-color: var(--correct); border-style: solid; background: rgba(29, 185, 84, 0.1); box-shadow: inset 0 0 25px rgba(29, 185, 84, 0.2); }
        .word-bank { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 20px;}
        .word-chip { padding: 14px 28px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; user-select: none; transition: all 0.3s; font-weight: 800; color: #fff; font-size: 1.2rem; font-family: var(--font-code); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .word-chip:hover { background: var(--accent); color: #000; border-color: var(--accent); transform: translateY(-4px); }
        .word-chip.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

        .error-sentence { font-size: 1.8rem; word-spacing: 8px; line-height: 2; font-weight: 700; text-align: center; padding: 35px; background: rgba(0,0,0,0.3); border-radius: 20px; border: 1px solid var(--border); }
        .error-word { display: inline-block; padding: 8px 16px; cursor: pointer; border-radius: 12px; transition: 0.3s; border: 1px solid transparent; }
        .error-word:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: scale(1.05); }

        .phone-ui { width: 100%; max-width: 360px; height: 500px; background: #0f172a; border: 12px solid #1e293b; border-radius: 35px; position: relative; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
        .phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 110px; height: 24px; background: #1e293b; border-bottom-left-radius: 14px; border-bottom-right-radius: 14px; z-index: 20; }
        .phone-top-bar { height: 70px; background: rgba(30, 41, 59, 0.95); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 12px; font-weight: 800; font-size: 1.1rem; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .phone-chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .phone-msg { padding: 12px 18px; border-radius: 18px; max-width: 85%; font-size: 1.1rem; line-height: 1.4; animation: popIn 0.3s ease-out forwards; }
        .phone-msg.received { background: #334155; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
        .phone-msg.sent { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 700; }
        .phone-options-area { padding: 20px; background: rgba(30, 41, 59, 0.95); border-top: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px; }
        .phone-opt-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; text-align: center; }
        .phone-opt-btn:hover { background: var(--accent); color: #000; }

        .typing-indicator { display: flex; gap: 4px; padding: 12px 15px; background: #334155; border-radius: 16px; align-self: flex-start; border-bottom-left-radius: 4px; animation: popIn 0.3s ease-out forwards; }
        .dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* TOGGLE SWITCH FOR GRAMMAR SANDBOX */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; margin: 0 15px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--incorrect); transition: .4s; border-radius: 34px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        input:checked + .slider { background-color: var(--correct); }
        input:checked + .slider:before { transform: translateX(26px); }

        .arena-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; perspective: 1000px; margin-top: 30px; }
        .arena-card { background: transparent; height: 220px; cursor: pointer; }
        .arena-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .arena-card.flipped .arena-card-inner { transform: rotateY(180deg); }
        .arena-card-front, .arena-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .arena-card-front { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .arena-card-front i { font-size: 3rem; color: var(--accent); margin-bottom: 15px; }
        .arena-card-front h3 { font-family: var(--font-display); font-size: 1.4rem; color: #fff; }
        .arena-card-back { background: var(--accent); color: #000; transform: rotateY(180deg); box-shadow: 0 10px 30px var(--accent-glow); }
        .arena-card-back p { color: #000; font-size: 1.25rem; font-weight: 800; margin: 0; line-height: 1.5; }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.7); margin-bottom: 30px; max-width: 700px; margin-inline: auto; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .side-panel { position: fixed; top: 0; width: 450px; height: 100vh; background: rgba(10, 20, 12, 0.98); backdrop-filter: blur(40px); z-index: 200; padding: 90px 40px 40px; transition: 0.4s cubic-bezier(0.25, 1, 0.25, 1); display: flex; flex-direction: column; gap: 20px; box-shadow: 0 0 60px rgba(0,0,0,0.9); }
        #vocabPanel { right: -470px; border-left: 1px solid var(--border); }
        #vocabPanel.open { right: 0; }
        #whiteboardPanel { left: -470px; border-right: 1px solid var(--border); }
        #whiteboardPanel.open { left: 0; }
        .whiteboard-area { flex: 1; background: rgba(0,0,0,0.4); border: 2px dashed var(--border); border-radius: 16px; color: var(--accent); font-family: var(--font-code); font-size: 1.2rem; padding: 25px; resize: none; outline: none; }
        .whiteboard-area:focus { border-color: var(--accent); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-6px); } 50% { transform: translateX(6px); } }
    </style>
</head>
<body>

    <div class="ambient-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <header class="header">
        <div class="logo"><i class="fa-solid fa-brain" style="color:var(--accent); font-size: 1.8rem;"></i> WOLF LABS <span>LIFESTYLE B2</span></div>

    <main id="main-container"></main>

    <nav class="nav-bar">
        <button class="btn" style="background: transparent;" id="prevBtn" onclick="prevStep()" disabled><i class="fa-solid fa-arrow-left"></i> PREV</button>
        <div style="font-family: var(--font-code); font-weight: 800; font-size: 1.1rem; color: var(--accent); letter-spacing: 3px;" id="step-counter">SCENE 01 / 31</div>
        <button class="btn btn-accent" id="nextBtn" onclick="nextStep()">NEXT <i class="fa-solid fa-arrow-right"></i></button>

    <aside class="side-panel" id="vocabPanel">
        <button onclick="closeVocab()" style="position: absolute; top: 25px; left: 25px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; transition: 0.3s;"><i class="fa-solid fa-xmark"></i></button>
        <div id="asideContent" style="margin-top: 40px; overflow-y: auto;"></div>
    </aside>

    <script>
        // === B2 LIFESTYLE / PHILOSOPHY DATA ===
        const vocabData = {
            'juncture': { def: 'A particular point in events or time, often a critical one (crossroads).', ex: 'You are at a juncture in your life and must make a choice.', speak: 'What was the most difficult juncture in your career?' },
            'play it safe': { def: 'To avoid taking risks.', ex: 'You have two choices: you can play it safe or take a chance.', speak: 'Are you the kind of person who usually plays it safe?' },
            'take a chance': { def: 'To do something risky in the hope of a good outcome.', ex: 'People often regret not taking a chance.', speak: 'When was the last time you took a big chance?' },
            'drift apart': { def: 'To slowly lose contact or emotional connection with someone.', ex: 'The relationship did not explode, it just drifted apart.', speak: 'Why do childhood friends usually drift apart?' },
            'reach out': { def: 'To make an effort to communicate or connect with someone.', ex: 'You want to reach out to an old friend, but it feels awkward.', speak: 'Is it hard for you to reach out after a fight?' },
            'screw-up': { def: 'A situation completely mismanaged or mishandled; a big mistake (Informal).', ex: 'When we have screw-ups, we are cruel to ourselves.', speak: 'How do you usually recover from a big screw-up at work?' },

        };

        const stepsData = [
            // SCENE 1: Teacher Protocol
            `<div class="glass-panel" style="border-color: var(--accent);">
                <h2 style="color: #fff;"><i class="fa-solid fa-user-shield" style="color: var(--accent);"></i> ADMIN PROTOCOL</h2>
                <div style="background: rgba(0,0,0,0.5); padding: 35px; border-radius: 16px; font-family: var(--font-code); color: var(--accent); margin-bottom: 25px;">
                    <p style="margin:0;">> TOPIC: The Anatomy of Regret & Philosophy</p>
                    <p style="margin:0;">> LEVEL: B2 Upper-Intermediate</p>
                    <p style="margin:0;">> GRAMMAR: Unreal Past (If only I had + Past Participle)</p>
                    <p style="margin:0;">> VIDEO: Daniel Pink - The 4 Regrets Every Human Has</p>
                    <p style="margin:0;">> MISSION: 31 Pages</p>
                </div>
                <p>Teacher, this lesson transitions from survival English to abstract, philosophical debates. Encourage the student to use the target grammar while sharing personal opinions on risk, relationships, and morals.</p>
                <div class="speaking-hub" id="p_1" style="display:block;">
                    <p>SYSTEM READY. Awaiting Teacher Command to start the debate.</p>
                </div>
            </div>`,

            // SCENE 2: Premium Split-Screen Cover
            `<div class="glass-panel" style="padding: 0; overflow: hidden; display: flex; flex-direction: row; border: 1px solid var(--accent); box-shadow: 0 25px 60px rgba(29, 185, 84, 0.25);">
                <div style="flex: 1; padding: 70px 60px; display: flex; flex-direction: column; justify-content: center; background: linear-gradient(135deg, rgba(10, 20, 12, 0.95) 0%, rgba(5, 10, 6, 0.95) 100%);">
                    <span style="font-family: var(--font-code); color: var(--accent); font-weight: 700; letter-spacing: 3px; font-size: 1rem; margin-bottom: 15px; display: block;">WOLF LABS PHILOSOPHY</span>
                    <h1 style="font-size: 4.5rem; margin-bottom: 25px; line-height: 1.05; text-shadow: 0 5px 15px rgba(0,0,0,0.5);">THE ANATOMY<br>OF REGRET</h1>
                    <p style="font-size: 1.25rem; color: var(--text-dim); margin-bottom: 35px; max-width: 90%;">Dive deep into the 4 universal human regrets. Master complex arguments and hypothetical past structures.</p>
                    
                    <div style="display: flex; gap: 15px; margin-bottom: 45px; flex-wrap: wrap;">
                        <span style="background: rgba(29, 185, 84, 0.1); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 500px; font-family: var(--font-code); font-size: 0.9rem; font-weight: 700; color: #fff;">
                            <i class="fa-solid fa-layer-group" style="color: var(--accent); margin-right: 6px;"></i>LEVEL: B2 UPPER-INT.

        // --- SUPREME CORE LOGIC ---
        let currentStep = 0;

        function initializeSteps() {
            mainContainer.innerHTML = '';

                const section = document.createElement('section');
                section.className = 'step';
                section.id = `step-${index}`;
                section.innerHTML = htmlContent;
                mainContainer.appendChild(section);
            });
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.step').forEach((step, index) => {
                step.classList.toggle('active', index === currentStep);
            });
            document.getElementById('prevBtn').disabled = currentStep === 0;
            document.getElementById('nextBtn').style.display = currentStep === stepsData.length - 1 ? 'none' : 'flex';
            
            // Update counter
            let stepNum = (currentStep + 1).toString().padStart(2, '0');
            let totalSteps = stepsData.length.toString().padStart(2, '0');
            document.getElementById('step-counter').innerText = `SCENE ${stepNum} / ${totalSteps}`;
            
            // Update Progress Bar
            if (document.getElementById('progressBar')) {
                document.getElementById('progressBar').style.width = `${((currentStep + 1) / stepsData.length) * 100}%`;
            }
        }

        function nextStep() { if (currentStep < stepsData.length - 1) { currentStep++; updateUI(); closeVocab(); document.getElementById('whiteboardPanel').classList.remove('open'); } }

        function unlockPrompt(id) { const p = document.getElementById(id); if(p) p.style.display = 'block'; }

        function genericCorrect(btn, isCorrect, promptIdStr) {
            const parent = btn.parentElement;
            let attempts = parseInt(parent.dataset.attempts || '0');
            const options = Array.from(parent.querySelectorAll('div, button, span')).filter(b => b.hasAttribute('onclick') && b.getAttribute('onclick').includes('genericCorrect'));
            const maxAttempts = Math.min(3, options.length - 1);
            if(isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                
                if(btn.tagName.toLowerCase() === 'span' || btn.tagName.toLowerCase() === 'button') {
                    btn.style.backgroundColor = 'var(--correct)'; 
                    btn.style.color = '#000'; 
                    btn.style.borderColor = 'var(--correct)';
                } else {
                    btn.style.backgroundColor = 'rgba(29, 185, 84, 0.1)'; 
                    btn.style.borderColor = 'var(--correct)';
                }
                
                if (promptIdStr) unlockPrompt(promptIdStr);
            } else {
                attempts++; parent.dataset.attempts = attempts;
                
                if(btn.tagName.toLowerCase() === 'span' || btn.tagName.toLowerCase() === 'button') {
                    btn.style.backgroundColor = 'var(--incorrect)'; btn.style.color = '#fff'; btn.style.borderColor = 'var(--incorrect)';
                } else {
                    btn.style.backgroundColor = 'rgba(226, 33, 52, 0.1)'; btn.style.borderColor = 'var(--incorrect)';
                }
                
                btn.style.animation = 'shake 0.4s'; btn.style.pointerEvents = 'none';
                
                if (attempts >= maxAttempts) {
                    options.forEach(b => b.style.pointerEvents = 'none');
                    const correctBtn = options.find(b => b.getAttribute('onclick') && b.getAttribute('onclick').includes('true'));
                    if (correctBtn) { 
                        if(correctBtn.tagName.toLowerCase() === 'span' || correctBtn.tagName.toLowerCase() === 'button') {
                            correctBtn.style.backgroundColor = 'var(--correct)'; correctBtn.style.color = '#000'; correctBtn.style.borderColor = 'var(--correct)';
                        } else {
                            correctBtn.style.backgroundColor = 'rgba(29, 185, 84, 0.1)'; correctBtn.style.borderColor = 'var(--correct)';
                        }
                    }
                    if (promptIdStr) setTimeout(() => unlockPrompt(promptIdStr), 500);
                }
            }

        window.buildState = {};
        window.moveWord = function(chip, dzId, targetArrayStr, promptId) {
            if(chip.classList.contains('used')) return;
            
            const targetArray = targetArrayStr.split(',');
            const word = chip.innerText;
            const dz = document.getElementById(dzId);
            const newChip = document.createElement('div');
            newChip.className = 'word-chip'; 
            newChip.style.background = 'var(--accent)'; 
            newChip.style.color = '#000'; 
            newChip.style.borderColor = 'var(--accent)';
            newChip.innerText = word;
            
            if (!chip.id) chip.id = 'chip_' + Math.random().toString(36).substr(2, 9);
            newChip.dataset.sourceId = chip.id;
            
            newChip.onclick = function() {
                if(dz.classList.contains('success')) return;
                dz.removeChild(this); document.getElementById(this.dataset.sourceId).classList.remove('used');
                const idx = window.buildState[dzId].lastIndexOf(this.innerText);
                if(idx !== -1) window.buildState[dzId].splice(idx, 1);
            };
            
            dz.appendChild(newChip); chip.classList.add('used');
            if(!window.buildState[dzId]) window.buildState[dzId] = [];
            window.buildState[dzId].push(word);

                if(JSON.stringify(window.buildState[dzId]) === JSON.stringify(targetArray)) {
                    dz.classList.add('success');
